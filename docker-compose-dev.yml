services:
  next:
    build:
      context: .
      target: base
    env_file: .env
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    init: true
    environment:
      NODE_ENV: development
      HOSTNAME: 0.0.0.0
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      PORT: 3000
    restart: unless-stopped
    volumes:
      - .:/app
      - next_node_modules:/app/node_modules
      - next_next_cache:/app/.next
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16.3-alpine
    env_file: .env
    volumes:
      - postgres-data-16:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} -h 127.0.0.1"]
      interval: 20s
      timeout: 3s
      retries: 5
      start_period: 20s
    ports:
      - "5432:5432"

volumes:
  postgres-data-16:
  next_node_modules:
  next_next_cache:
