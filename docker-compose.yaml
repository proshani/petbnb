services:
  nginx:
    image: nginx:stable-alpine
    depends_on: [nextjs_blue, nextjs_green]
    ports: ["80:80", "443:443"]
    volumes:
      - /srv/app/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /srv/app/nginx/upstream-active.conf:/etc/nginx/conf.d/upstream-active.conf:ro
      - certbot-www:/var/www/certbot:ro
      - letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        compress: "true"

  nextjs_blue: &nextjs_service
    image: alishavps/petbnb-next:latest
    container_name: petbnb-next-blue
    env_file: .env
    init: true
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health-check >/dev/null 2>&1 || exit 1"]
      interval: 1m
      timeout: 6s
      start_period: 20s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5", compress: "true" }

  nextjs_green:
    <<: *nextjs_service
    container_name: petbnb-next-green

  postgres:
    image: postgres:16.3-alpine
    env_file: .env
    volumes:
      - postgres-data-16:/var/lib/postgresql/data
      - /srv/db_backups:/backups:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h 127.0.0.1"]
      interval: 20s
      timeout: 3s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    ports:
      - "5432:5432"
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5", compress: "true" }

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    restart: "no"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
        compress: "true"

volumes:
  postgres-data-16:
  certbot-www:
  letsencrypt:
