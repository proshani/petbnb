worker_processes auto;

events {
  worker_connections 1024;
}

http {
  resolver 127.0.0.11 valid=30s ipv6=off;

  # ---------- IP Blocking ----------
  map $remote_addr $blocked_ip {
    default 0;
    # Add IPs to block: 1.2.3.4 1;
  }

  # ---------- Rate/connection limiting ----------
  limit_req_zone $binary_remote_addr zone=req_per_ip:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=10r/s;
  limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

  limit_req_status 429;
  limit_conn_status 429;

  # ---------- General ----------
  client_max_body_size 10m;
  send_timeout 30s;
  keepalive_timeout 65s;
  sendfile on;
  tcp_nopush on;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;
  gzip_min_length 1024;

  # =========================
  # 1) HTTP (80): ACME + 301
  # =========================
  server {
    listen 80;
    server_name i8pixel.com www.i8pixel.com;

    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
      default_type "text/plain";
      access_log off;
    }

    location = /health {
      return 200 "ok\n";
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ===========================
  # 2) HTTPS (443): real app
  # ===========================
  server {
    listen 443 ssl;
    http2 on;
    server_name i8pixel.com www.i8pixel.com;

    if ($blocked_ip) {
      return 403;
    }

    ssl_certificate /etc/letsencrypt/live/i8pixel.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/i8pixel.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    limit_conn conn_per_ip 20;

    # ---- API routes ----
    location ^~ /api/ {
      include /etc/nginx/conf.d/upstream-active.conf;
      limit_req zone=api_per_ip burst=20 nodelay;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_read_timeout 60s;
      proxy_pass http://$active_upstream;
    }

    # ---- Everything else → Next.js ----
    location / {
      include /etc/nginx/conf.d/upstream-active.conf;
      limit_req zone=req_per_ip burst=40 nodelay;
      limit_conn conn_per_ip 20;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_read_timeout 60s;
      proxy_pass http://$active_upstream;
    }
  }
}
